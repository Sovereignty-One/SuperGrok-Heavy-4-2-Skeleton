name: Quart App CI

on: [push]

jobs:
  build-linux:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    - name: Install dependencies
      run: |
        pip install -r .github/workflows/Requirements.txt
    - name: Test with pytest
      env:
        PYTHONPATH: .:./backend
      run: |
        pip install pytest
        pytest
    - name: Run Quart App for Testing
      run: |
        # Install hypercorn for running Quart apps
        pip install hypercorn
        # Start the Quart app in the background using hypercorn
        hypercorn weather_dashboard:app --bind 0.0.0.0:9898 &
        APP_PID=$!
        echo "Started hypercorn with PID: $APP_PID"
        # Wait for the app to start and verify it's running
        sleep 5
        if ! kill -0 $APP_PID 2>/dev/null; then
          echo "Error: Hypercorn process failed to start"
          exit 1
        fi
        # Test the endpoint
        curl -f http://localhost:9898/api/weather?city=London || exit 1
        # Kill the background process using specific PID
        kill $APP_PID